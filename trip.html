<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅程詳情 - Jiuan's Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="trips-data.js"></script>
  <script src="trip-detail-data.js"></script>
  <style>
    :root {
      --ink: #163038;
      --sea: #1f5560;
      --foam: #eaf4f3;
      --sand: #f6efe5;
      --line: rgba(22, 48, 56, 0.12);
    }
    body {
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
      line-height: 1.75;
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at top left, rgba(216, 141, 77, 0.08), transparent 26%),
        linear-gradient(180deg, #fbf8f2 0%, #f4f8f8 34%, #fafcfc 100%);
    }
    .trip-country-article { transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease; }
    .trip-country-article:hover { transform: translateY(-4px); box-shadow: 0 28px 60px -18px rgb(15 23 42 / 0.18); border-color: rgba(31, 85, 96, 0.22); }
    .trip-filter-btn.active {
      background: linear-gradient(135deg, #1f5560, #2c7482);
      color: white;
      box-shadow: 0 14px 28px -14px rgba(31, 85, 96, 0.72);
      border-color: transparent;
    }
    .travel-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .hero-panel {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 60px -24px rgba(15, 23, 42, 0.36);
    }
    .quick-fact-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 40px -28px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(10px);
    }
    .article-shell {
      border: 1px solid rgba(31, 85, 96, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(255,255,255,0.94));
      box-shadow: 0 34px 70px -42px rgba(22, 48, 56, 0.22);
    }
    .guide-prose { font-size: 1.04rem; color: rgb(62 75 84); }
    .guide-prose .guide-h2 {
      font-size: 1.55rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em;
      margin-top: 2.8rem; margin-bottom: 1rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(31, 85, 96, 0.14);
    }
    .guide-prose .guide-h2:first-child { margin-top: 0; }
    .guide-prose .guide-p { margin-bottom: 1.2rem; line-height: 2; color: rgb(70 82 91); }
    .guide-prose .guide-ul { margin: 0 0 1.45rem 1.15rem; list-style: disc; }
    .guide-prose .guide-ul li { margin-bottom: 0.7rem; padding-left: 0.3rem; color: rgb(70 82 91); }
    .guide-prose em { color: #7a5b32; font-style: italic; }
    .guide-prose strong { color: var(--ink); font-weight: 700; }
    .guide-toc a { display: block; padding: 0.55rem 0; border-bottom: 1px solid rgb(243 244 246); font-size: 0.9rem; color: #2c7482; }
    .guide-toc a:hover { text-decoration: underline; }
    .guide-callout-sky { border-radius: 1.2rem; border: 1px solid rgba(31, 85, 96, 0.14); background: linear-gradient(135deg, #f2fbfb, #ffffff); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-callout-amber { border-radius: 1.2rem; border: 1px solid rgba(216, 141, 77, 0.28); background: rgb(255 251 235); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-route-step { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.65rem; font-size: 0.9375rem; }
    .guide-info-box { border-radius: 1.2rem; border: 1px solid rgba(22, 48, 56, 0.1); background: linear-gradient(180deg, #fafcfc, #ffffff); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-blockquote { border-left: 4px solid #2c7482; padding: 0.9rem 0 0.9rem 1.25rem; margin: 1.7rem 0; font-size: 1.125rem; font-style: italic; color: rgb(65 78 88); background: #f7fbfb; border-radius: 0 0.9rem 0.9rem 0; }
  </style>
</head>
<body class="min-h-screen text-[var(--ink)]">

  <nav class="sticky top-0 z-50 border-b border-sky-200/70 bg-[rgba(244,248,248,0.92)] shadow-sm backdrop-blur-xl">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <a href="index.html" class="text-sky-800 font-black text-lg tracking-tight shrink-0">Jiuan's Travel</a>
        <a href="journeys.html" class="hidden sm:inline-flex text-xs font-bold text-sky-800 hover:text-sky-700 border border-sky-300 rounded-full px-3 py-1 transition-colors whitespace-nowrap bg-white/70">全部旅程</a>
      </div>
      <a href="journeys.html" class="text-sm font-medium text-sky-800 hover:text-sky-700">← 全部旅程</a>
    </div>
  </nav>

  <article id="trip-root" class="min-h-screen">
    <p class="text-center text-gray-400 text-sm py-16">載入中…</p>
  </article>

  <footer class="bg-white border-t border-gray-100 py-10 text-center">
    <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em]">© 2026 Jiuan's Travel</p>
  </footer>

  <script src="trips-data.js"></script>
  <script src="trip-detail-data.js"></script>
  <script>
    (function () {
      function esc(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function rich(s) {
        return s == null ? '' : String(s);
      }

      function formatDateLabel(value) {
        if (!value) return '';
        var d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.getFullYear() + ' / ' + String(d.getMonth() + 1).padStart(2, '0') + ' / ' + String(d.getDate()).padStart(2, '0');
      }

      function tripTimeLabel(trip) {
        if (trip.start && trip.end && trip.end !== trip.start) {
          return formatDateLabel(trip.start) + ' — ' + formatDateLabel(trip.end);
        }
        if (trip.start) return formatDateLabel(trip.start);
        return trip.year ? String(trip.year) : '';
      }

      function factCard(label, value, tone) {
        if (!value) return '';
        var toneClass = tone === 'accent'
          ? 'text-[var(--sea)] bg-[var(--foam)] border-[rgba(31,85,96,0.12)]'
          : tone === 'warm'
            ? 'text-[#8a5a2f] bg-[#fff8ef] border-[rgba(216,141,77,0.18)]'
            : 'text-slate-700 bg-white/80 border-slate-200/80';
        return '<div class="quick-fact-card rounded-[1.4rem] px-4 py-3 ' + toneClass + '">'
          + '<p class="text-[10px] font-bold uppercase tracking-[0.24em] opacity-55">' + esc(label) + '</p>'
          + '<p class="mt-2 text-sm font-semibold leading-6">' + esc(value) + '</p>'
          + '</div>';
      }

      function buildTripFacts(trip) {
        var chips = [];
        if (trip.countries && trip.countries.length) chips.push(factCard('國家', trip.countries.join(' · '), 'accent'));
        if (trip.cities && trip.cities.length) chips.push(factCard('城市', trip.cities.join(' · '), 'neutral'));
        if (trip.days) chips.push(factCard('旅程天數', '共 ' + trip.days + ' 天', 'warm'));
        var time = tripTimeLabel(trip);
        if (time) chips.push(factCard('旅行時間', time, 'neutral'));
        return chips.join('');
      }

      function renderGuideBlocks(sections) {
        if (!sections || !sections.length) return '';
        var out = '';
        sections.forEach(function (b) {
          if (!b || !b.type) return;
          if (b.type === 'h2') {
            out += '<h2 id="' + esc(b.id) + '" class="guide-h2 scroll-mt-36">' + rich(b.text) + '</h2>';
          } else if (b.type === 'p') {
            out += '<p class="guide-p">' + rich(b.text) + '</p>';
          } else if (b.type === 'ul' && b.items) {
            out += '<ul class="guide-ul">';
            b.items.forEach(function (item) { out += '<li>' + rich(item) + '</li>'; });
            out += '</ul>';
          } else if (b.type === 'callout') {
            var ccls = b.variant === 'amber' ? 'guide-callout-amber' : 'guide-callout-sky';
            out += '<div class="' + ccls + '">';
            if (b.title) {
              out += '<p class="text-xs font-bold uppercase tracking-widest mb-2 text-gray-800">' + rich(b.title) + '</p>';
            }
            out += '<p class="text-sm leading-relaxed text-gray-700">' + rich(b.body) + '</p></div>';
          } else if (b.type === 'route' && b.steps) {
            out += '<div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm my-6">';
            out += '<p class="text-sm font-bold text-gray-900 mb-3">' + rich(b.title) + '</p>';
            b.steps.forEach(function (step, i) {
              out += '<div class="guide-route-step"><span class="shrink-0 flex h-6 w-6 items-center justify-center rounded-full bg-sky-100 text-[11px] font-bold text-sky-800">' + (i + 1) + '</span><span class="text-gray-700">' + rich(step) + '</span></div>';
            });
            out += '</div>';
          } else if (b.type === 'infoBox' && b.rows) {
            out += '<div class="guide-info-box">';
            if (b.title) out += '<p class="text-sm font-bold text-gray-800 mb-3">' + rich(b.title) + '</p>';
            b.rows.forEach(function (r) {
              out += '<div class="flex flex-col sm:flex-row sm:gap-4 py-2 border-b border-gray-200/80 last:border-0 text-sm">';
              out += '<span class="shrink-0 font-semibold text-sky-700 w-28">' + rich(r.label) + '</span>';
              out += '<span class="text-gray-600 leading-relaxed">' + rich(r.value) + '</span></div>';
            });
            out += '</div>';
          } else if (b.type === 'blockquote') {
            out += '<blockquote class="guide-blockquote">' + rich(b.text) + '</blockquote>';
          } else if (b.type === 'photos' && b.items && b.items.length) 
          {
            out += '<div class="my-10 space-y-5">';
            b.items.forEach(function (p, idx) {
              var wide = b.items.length === 1;
              out += '<figure class="group mx-auto max-w-2xl overflow-hidden rounded-[1.4rem] border border-[rgba(22,48,56,0.08)] bg-white shadow-[0_16px_36px_-28px_rgba(15,23,42,0.22)]">';
              out += '<div class="' + (wide ? 'aspect-[4/3]' : 'aspect-[4/3]') + ' overflow-hidden bg-slate-100">';
              out += '<img src="' + esc(p.src) + '" alt="' + esc(p.caption || '') + '" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-[1.02]" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.insertAdjacentHTML(\'beforeend\',\'<div class=&quot;flex h-full items-center justify-center px-6 text-center text-sm leading-6 text-slate-400&quot;>圖片載入失敗，請檢查 assets 路徑或檔名</div>\')">';
              out += '</div>';
              if (p.caption) {
                out += '<figcaption class="border-t border-slate-100 bg-[rgba(248,250,252,0.72)] px-4 py-2.5 text-[12px] italic leading-6 text-slate-500">' + esc(p.caption) + '</figcaption>';
              }
              out += '</figure>';
            });
            out += '</div>';
          } else if (b.type === 'faq' && b.items) {
            out += '<dl class="space-y-3 mt-2">';
            b.items.forEach(function (item) {
              out += '<div class="rounded-xl bg-white border border-gray-100 px-4 py-3 shadow-sm">';
              out += '<dt class="text-sm font-semibold text-gray-900">' + rich(item.q) + '</dt>';
              out += '<dd class="mt-1.5 text-sm text-gray-600 leading-relaxed">' + rich(item.a) + '</dd></div>';
            });
            out += '</dl>';
          }
        });
        return out;
      }

      function buildGuideTocNav(toc, className) {
        if (!toc || !toc.length) return '';
        var navClass = className || 'guide-toc';
        var links = toc.map(function (item) {
          return '<a href="#' + esc(item.id) + '">' + esc(item.title) + '</a>';
        }).join('');
        return '<nav class="' + navClass + '" aria-label="文章目錄">' + links + '</nav>';
      }

      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var root = document.getElementById('trip-root');

      if (!id || typeof TRIPS_DATA === 'undefined') {
        root.innerHTML = '<div class="max-w-3xl mx-auto px-4 py-16 text-center text-gray-500">找不到旅程。請從<a href="journeys.html" class="text-sky-600 underline">全部旅程</a>進入。</div>';
        document.title = '找不到旅程 - Jiuan\'s Travel';
        return;
      }

      var trip = TRIPS_DATA.filter(function (t) { return t.id === id; })[0];
      if (!trip) {
        root.innerHTML = '<div class="max-w-3xl mx-auto px-4 py-16 text-center text-gray-500">找不到此趟旅程。</div>';
        return;
      }

      document.title = esc(trip.name) + ' - Jiuan\'s Travel';

      var detail = (typeof TRIP_DETAILS !== 'undefined' && TRIP_DETAILS[id]) ? TRIP_DETAILS[id] : null;
      var guide = detail && detail.guide ? detail.guide : null;
      var hasGuide = !!(guide && guide.sections && guide.sections.length);
      var hasCountries = !!(detail && detail.countries && detail.countries.length);

      var html = '';

      if (hasGuide || hasCountries) {
        var tripFactsHtml = buildTripFacts(trip);
        var tripTime = tripTimeLabel(trip);
        html += '<header class="relative overflow-hidden">';
        html += '<div class="relative h-[min(48vh,460px)] w-full overflow-hidden">';
        html += '<img src="' + esc(trip.image) + '" alt="" class="w-full h-full object-cover">';
        html += '<div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(8,18,22,0.16),rgba(12,29,34,0.38),rgba(12,29,34,0.78))]"></div>';
        html += '<div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(255,255,255,0.18),transparent_26%),radial-gradient(circle_at_bottom_right,rgba(31,85,96,0.22),transparent_30%)]"></div>';
        html += '<div class="absolute inset-x-0 bottom-0 px-4 pb-8 md:pb-10">';
        html += '<div class="max-w-6xl mx-auto">';
        html += '<div class="max-w-3xl rounded-[2rem] border border-white/12 bg-[rgba(10,20,24,0.28)] px-6 py-6 text-white shadow-[0_28px_60px_-32px_rgba(15,23,42,0.45)] backdrop-blur-xl md:px-8 md:py-8">';
        html += '<p class="text-[11px] font-bold uppercase tracking-[0.34em] text-white/60 mb-3">Travel Guide · Jiuan\'s Travel</p>';
        html += '<h1 class="max-w-3xl text-3xl font-semibold leading-tight text-white md:text-5xl lg:text-[3.9rem] lg:leading-[1.05]">' + esc(trip.name) + '</h1>';
        if (trip.summary) {
          html += '<p class="mt-4 max-w-2xl text-sm leading-7 text-white/82 md:text-base">' + esc(trip.summary) + '</p>';
        }
        html += '<div class="mt-5 flex flex-wrap gap-2">';
        if (trip.year) html += '<span class="travel-pill">✦ ' + trip.year + '</span>';
        if (trip.days) html += '<span class="travel-pill">⏳ 共 ' + trip.days + ' 天</span>';
        if (tripTime) html += '<span class="travel-pill">🗓 ' + esc(tripTime) + '</span>';
        if (trip.countries && trip.countries.length) html += '<span class="travel-pill">📍 ' + esc(trip.countries.join(' · ')) + '</span>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</header>';

        if (tripFactsHtml) {
          html += '<section class="px-4 -mt-8 relative z-10">';
          html += '<div class="max-w-6xl mx-auto">';
          html += '<div class="rounded-[1.8rem] border border-[rgba(22,48,56,0.08)] bg-white/92 p-4 shadow-[0_24px_55px_-34px_rgba(15,23,42,0.24)] backdrop-blur md:p-5">';
          html += '<div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">' + tripFactsHtml + '</div>';
          html += '</div></div></section>';
        }

        var g = guide;
        if (hasGuide) {
          html += '<section class="px-4 pt-8 md:pt-10">';
          html += '<div class="article-shell max-w-6xl mx-auto rounded-[2rem] px-5 py-6 md:px-8 md:py-8">';
          html += '<div class="border-b border-slate-200/80 pb-6">';
          if (g.eyebrow) html += '<p class="text-[11px] font-bold tracking-[0.32em] text-[var(--sea)]/80 uppercase mb-3">' + esc(g.eyebrow) + '</p>';
          html += '<div class="flex flex-wrap items-center gap-2 text-xs text-slate-500 mb-5">';
          html += '<span class="rounded-full bg-[var(--ink)] px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.2em] text-white">Guide Note</span>';
          if (trip.cities && trip.cities.length) {
            trip.cities.forEach(function (city) {
              html += '<span class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-[11px] font-medium text-slate-600">' + esc(city) + '</span>';
            });
          }
          html += '</div>';
          if (g.lead) html += '<p class="max-w-3xl text-lg leading-8 text-slate-800 md:text-[1.35rem] md:leading-9">' + rich(g.lead) + '</p>';
          html += '</div>';

          html += '<div class="pt-8 md:pt-10">';
          html += '<details class="lg:hidden mb-8 rounded-[1.5rem] border border-[rgba(31,85,96,0.1)] bg-[var(--foam)]/70 p-4 shadow-sm">';
          html += '<summary class="cursor-pointer list-none text-sm font-bold text-[var(--ink)] [&::-webkit-details-marker]:hidden flex items-center justify-between gap-2">';
          html += '<span>重點整理（目錄）</span><span class="text-[var(--sea)] text-xs">點擊展開</span></summary>';
          html += '<div class="mt-4 pl-0.5">' + buildGuideTocNav(g.toc) + '</div></details>';

          html += '<div class="grid grid-cols-1 gap-10 lg:grid-cols-[260px_minmax(0,1fr)] lg:gap-14">';
          html += '<aside class="hidden lg:block">';
          html += '<div class="sticky top-24 rounded-[1.7rem] border border-[rgba(22,48,56,0.09)] bg-white/88 p-5 shadow-[0_18px_45px_-28px_rgba(15,23,42,0.22)] backdrop-blur">';
          html += '<p class="text-[11px] font-bold uppercase tracking-[0.28em] text-[var(--sea)]/45 mb-3">重點整理</p>';
          html += buildGuideTocNav(g.toc);
          html += '</div></aside>';
          html += '<div class="guide-prose min-w-0 max-w-3xl">' + renderGuideBlocks(g.sections) + '</div>';
          html += '</div></div></div></section>';
        } else {
          html += '<section class="px-4 pt-8 md:pt-10">';
          html += '<div class="article-shell max-w-4xl mx-auto rounded-[2rem] px-6 py-12 text-center md:px-10 md:py-16">';
          html += '<div class="flex justify-center mb-6"><div class="w-px h-12 bg-sky-300"></div></div>';
          html += '<p class="text-lg md:text-xl font-serif italic text-gray-800 leading-relaxed">' + esc(trip.summary) + '</p>';
          html += '</div></section>';
        }

        if (hasCountries) {
          html += '<section class="sticky top-[52px] z-40 mt-8 bg-white/78 backdrop-blur-xl py-4 border-y border-slate-200/70 shadow-[0_12px_28px_-24px_rgba(15,23,42,0.32)]">';
          html += '<div class="max-w-6xl mx-auto px-4 flex flex-wrap justify-center gap-3">';
          html += '<button type="button" class="trip-filter-btn active px-6 py-2 rounded-full text-xs font-bold transition-all bg-white border border-slate-200 text-slate-600 hover:border-sky-300" data-trip-filter="all">全部文章</button>';
          detail.countries.forEach(function (c) {
            html += '<button type="button" class="trip-filter-btn px-6 py-2 rounded-full bg-white border border-gray-200 text-gray-600 text-xs font-bold hover:border-sky-300 transition-all" data-trip-filter="' + esc(c.name) + '">' + esc(c.name) + '</button>';
          });
          html += '</div></section>';

          html += '<div class="max-w-5xl mx-auto px-4 py-10 pb-24">';
          var cardSectionTitle = hasGuide ? '旅程資料卡' : '各國說明';
          html += '<div class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">';
          html += '<div>';
          html += '<p class="text-[11px] font-bold uppercase tracking-[0.24em] text-sky-700/60">Country Notes</p>';
          html += '<h2 class="mt-2 text-2xl font-semibold text-slate-900">' + cardSectionTitle + '</h2>';
          html += '</div>';
          if (hasGuide) {
            html += '<p class="max-w-md text-sm leading-6 text-slate-500 shrink-0">呼應上方長文，這裡用資料卡快速整理地點、美食與瞬間，閱讀起來更像正式旅遊網站。</p>';
          }
          html += '</div>';

          detail.countries.forEach(function (c) {
            var spots = c.journeySpots;
            var teaser = '';
            if (c.moments) {
              teaser = String(c.moments).split(/\n/).map(function (x) { return x.trim(); }).filter(Boolean)[0] || '';
              if (teaser.length > 96) teaser = teaser.slice(0, 96) + '…';
            }
            if (!teaser && Array.isArray(spots) && spots.length) teaser = spots[0];
            if (!teaser && spots && typeof spots === 'string') teaser = spots.split('\n')[0];

            html += '<article data-country="' + esc(c.name) + '" class="trip-country-article flex flex-col md:flex-row bg-white/92 rounded-[2rem] border border-slate-200/80 overflow-hidden shadow-[0_24px_50px_-32px_rgba(15,23,42,0.28)] mb-10 backdrop-blur">';
            html += '<div class="md:w-2/5 aspect-video md:aspect-auto md:min-h-[260px] overflow-hidden bg-gray-100">';
            var countrySeeds = {'日本':'tokyo','韓國':'seoul','越南':'vietnam','馬來西亞':'borneo','香港':'hongkong','柬埔寨':'angkor','泰國':'thailand','挪威':'norway','丹麥':'copenhagen','瑞典':'stockholm','西班牙':'spain','葡萄牙':'lisbon','義大利':'italy','奧地利':'vienna','匈牙利':'budapest','捷克':'prague','波蘭':'warsaw','比利時':'brussels','荷蘭':'amsterdam','德國':'berlin','芬蘭':'finland','英國':'london','法國':'paris','智利':'chile','波利維亞':'bolivia','秘魯':'peru'};
            var imgSeed = countrySeeds[c.name] || (c.name ? c.name.charCodeAt(0) : 'travel');
            html += '<img src="https://picsum.photos/seed/' + imgSeed + '/800/600" alt="" class="w-full h-full object-cover">';
            html += '</div>';
            html += '<div class="p-8 md:w-3/5 flex flex-col justify-center">';
            html += '<span class="text-[10px] font-bold text-sky-600 bg-sky-50 px-2 py-0.5 rounded w-fit mb-3">國家</span>';
            html += '<h3 class="text-2xl font-bold text-gray-900 mb-3">' + esc(c.name) + '</h3>';
            if (teaser) html += '<p class="text-sm text-gray-500 leading-relaxed mb-6">' + esc(teaser) + '</p>';

            html += '<div class="space-y-5 border-t border-gray-50 pt-6">';
            html += '<div><h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">旅程地點</h4>';
            if (Array.isArray(spots)) {
              html += '<ul class="list-none pl-0 text-sm text-gray-700 space-y-2">';
              spots.forEach(function (spot) {
                var label, url;
                if (spot && typeof spot === 'object') {
                  label = spot.name || '';
                  url   = spot.mapUrl || null;
                } else {
                  label = String(spot);
                  url   = null;
                }
                if (url) {
                  html += '<li class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-sky-400 shrink-0"></span><span>' + esc(label) + '</span><a href="' + esc(url) + '" target="_blank" rel="noopener" class="shrink-0 text-[10px] font-bold text-sky-600 bg-sky-50 hover:bg-sky-100 border border-sky-100 px-2 py-0.5 rounded-full transition-colors">地圖</a></li>';
                } else {
                  html += '<li class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-sky-400 shrink-0"></span><span>' + esc(label) + '</span></li>';
                }
              });
              html += '</ul>';
            } else if (spots) {
              html += '<p class="text-sm text-gray-700 whitespace-pre-line">' + esc(spots) + '</p>';
            } else {
              html += '<p class="text-sm text-gray-400">（待補）</p>';
            }
            html += '</div>';

            html += '<div><h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">美食</h4>';
            html += '<p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed">' + (c.food ? esc(c.food) : '（待補）') + '</p></div>';

            html += '<div><h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">深刻瞬間</h4>';
            html += '<p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed">' + (c.moments ? esc(c.moments) : '（待補）') + '</p></div>';

            if (c.practicalNotes) {
              html += '<div><h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">實用備註</h4>';
              html += '<p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed">' + esc(c.practicalNotes) + '</p></div>';
            }
            if (c.faq && c.faq.length) {
              html += '<div><h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">常見問題</h4>';
              html += '<dl class="space-y-3">';
              c.faq.forEach(function (item) {
                html += '<div class="rounded-lg bg-gray-50/80 border border-gray-100 px-3 py-2.5">';
                html += '<dt class="text-sm font-semibold text-gray-900">' + esc(item.q) + '</dt>';
                html += '<dd class="mt-1 text-sm text-gray-600 leading-relaxed">' + esc(item.a) + '</dd>';
                html += '</div>';
              });
              html += '</dl></div>';
            }
            if (c.readingLinks && c.readingLinks.length) {
              html += '<div class="text-sm text-gray-600"><span class="text-xs font-bold text-gray-400 uppercase tracking-widest mr-2">延伸</span>';
              html += c.readingLinks.map(function (L, i) {
                var sep = i ? ' · ' : '';
                return sep + '<a href="' + esc(L.href) + '" class="text-sky-700 font-medium hover:underline">' + esc(L.label) + '</a>';
              }).join('');
              html += '</div>';
            }

            html += '</div>';
            html += '<div class="pt-4 mt-2 border-t border-gray-50 text-[11px] text-gray-400">' + esc(trip.name) + '</div>';
            html += '</div></article>';
          });
        }

        if (hasCountries) {
          html += '</div>';
        }
      } else {
        html += '<header class="mb-10 max-w-3xl mx-auto px-4 pt-10">';
        html += '<p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">精選攻略 · 每趟旅行</p>';
        html += '<h1 class="text-2xl md:text-3xl font-bold text-gray-900 leading-tight">' + esc(trip.name) + '</h1>';
        html += '<p class="mt-3 text-gray-600 text-sm leading-relaxed">' + esc(trip.summary) + '</p>';
        html += '<div class="mt-4 flex flex-wrap gap-2 text-xs text-gray-500">';
        if (trip.year) html += '<span class="px-2 py-1 rounded-lg bg-white border border-gray-200">' + trip.year + '</span>';
        if (trip.days) html += '<span class="px-2 py-1 rounded-lg bg-white border border-gray-200">共 ' + trip.days + ' 天</span>';
        html += '</div></header>';
        html += '<div class="max-w-3xl mx-auto px-4 pb-20 rounded-2xl border border-dashed border-amber-200 bg-amber-50/50 p-6 text-sm text-amber-900">';
        html += '<p class="font-bold mb-2">此趟旅程尚未建立各國詳細內容</p>';
        html += '<p class="text-amber-800/90">之後補上各國的旅程地點、美食與故事後，就會以與其他攻略相同的版型呈現。</p>';
        html += '</div>';
      }

      root.innerHTML = html;

      if (hasCountries) {
        var btns = root.querySelectorAll('.trip-filter-btn');
        var articles = root.querySelectorAll('.trip-country-article');
        btns.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var target = btn.getAttribute('data-trip-filter');
            btns.forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            articles.forEach(function (art) {
              var cat = art.getAttribute('data-country');
              var show = target === 'all' || cat === target;
              art.style.display = show ? '' : 'none';
            });
          });
        });
      }
    })();
  </script>
</body>
</html>
