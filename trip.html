<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅程詳情 - Jiuan's Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/theme.css">
  <script src="assets/js/data/trips-data.js"></script>
  <script src="assets/js/data/trip-detail-data.js"></script>
  <style>
    .trip-country-article { transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease; }
    .trip-country-article:hover { transform: translateY(-3px); box-shadow: 0 24px 52px -24px rgba(96, 138, 149, 0.18); border-color: rgba(95, 152, 163, 0.2); }
    .trip-filter-btn.active {
      background: linear-gradient(135deg, #79afbb, #8bbec7);
      color: white;
      box-shadow: 0 12px 26px -16px rgba(95, 152, 163, 0.58);
      border-color: transparent;
    }
    .travel-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.96);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .hero-panel {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
      backdrop-filter: blur(16px);
      box-shadow: 0 28px 56px -28px rgba(75, 109, 118, 0.38);
    }
    .quick-fact-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(10px);
    }
    .article-shell {
      border: 1px solid rgba(95, 152, 163, 0.1);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,252,252,0.95));
      box-shadow: 0 32px 70px -46px rgba(92, 129, 140, 0.22);
    }
    .guide-prose { font-size: 1.04rem; color: rgb(70 86 93); }
    .guide-prose .guide-h2 {
      font-size: 1.55rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em;
      margin-top: 2.8rem; margin-bottom: 1rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(95, 152, 163, 0.14);
    }
    .guide-prose .guide-h2:first-child { margin-top: 0; }
    .guide-prose .guide-p { margin-bottom: 1.2rem; line-height: 2; color: rgb(82 96 103); }
    .guide-prose .guide-ul { margin: 0 0 1.45rem 1.15rem; list-style: disc; }
    .guide-prose .guide-ul li { margin-bottom: 0.7rem; padding-left: 0.3rem; color: rgb(82 96 103); }
    .guide-prose em { color: #8a7656; font-style: italic; }
    .guide-prose strong { color: var(--ink); font-weight: 700; }
    .guide-toc a { display: block; padding: 0.55rem 0; border-bottom: 1px solid rgba(95, 152, 163, 0.1); font-size: 0.9rem; color: #5f98a3; }
    .guide-toc a:hover { text-decoration: underline; }
    .guide-callout-sky { border-radius: 1.2rem; border: 1px solid rgba(95, 152, 163, 0.14); background: linear-gradient(135deg, #f4fbfc, #ffffff); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-callout-amber { border-radius: 1.2rem; border: 1px solid rgba(216, 141, 77, 0.2); background: rgb(255 251 239); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-route-step { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.65rem; font-size: 0.9375rem; }
    .guide-info-box { border-radius: 1.2rem; border: 1px solid rgba(95, 152, 163, 0.1); background: linear-gradient(180deg, #fcfefe, #f6fbfb); padding: 1rem 1.25rem; margin: 1.4rem 0; }
    .guide-blockquote {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      border: 1px solid rgba(95, 152, 163, 0.12);
      padding: 0.9rem 1rem;
      margin: 0.85rem 0;
      font-size: 0.98rem;
      font-style: normal;
      color: rgb(76 92 100);
      background: linear-gradient(180deg, rgba(247, 252, 253, 0.96), rgba(252, 254, 254, 0.98));
      border-radius: 1rem;
      box-shadow: 0 10px 24px -22px rgba(95, 152, 163, 0.28);
    }
    .guide-blockquote::before {
      content: "✦";
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 999px;
      background: rgba(95, 152, 163, 0.12);
      color: var(--sea);
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: 0.1rem;
    }
  </style>
</head>
<body class="min-h-screen text-[var(--ink)]">

  <div id="site-header"></div>

  <article id="trip-root" class="min-h-screen">
    <p class="text-center text-gray-400 text-sm py-16">載入中…</p>
  </article>

  <div id="site-footer"></div>

  <script src="assets/js/components/site-header.js"></script>
  <script src="assets/js/components/site-footer.js"></script>
  <script src="assets/js/utils/dom.js"></script>
  <script src="assets/js/utils/trip-helpers.js"></script>
  <script src="assets/js/data/trips-data.js"></script>
  <script src="assets/js/data/trip-detail-data.js"></script>
  <script src="assets/js/components/trip-layout.js"></script>
  <script src="assets/js/components/trip-guide.js"></script>
  <script src="assets/js/components/trip-country-cards.js"></script>
  <script src="assets/js/pages/trip.js"></script>
</body>
</html>
