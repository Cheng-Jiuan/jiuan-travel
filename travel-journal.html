<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行日誌 - Jiuan's Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { line-height: 1.65; scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">

  <nav class="bg-sky-200 sticky top-0 z-50 shadow-sm border-b border-sky-300/30">
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-2">
      <a href="index.html" class="text-sky-800 font-black text-lg tracking-tighter">Jiuan's Travel</a>
      <div class="flex items-center gap-3 text-sm font-medium text-sky-800">
        <a href="journeys.html" class="hover:text-sky-600 transition-colors">全部旅程</a>
        <a href="index.html" class="hover:text-sky-600 transition-colors">← 首頁</a>
      </div>
    </div>
  </nav>

  <header class="bg-white border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-8 md:py-10">
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.25em] mb-2">Journal</p>
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">旅行日誌</h1>
      <p class="mt-2 text-sm text-gray-500">沿著日期與旅程整理每一天的片段，快速回看每段移動與停留。</p>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 pb-20" id="journal-root"></main>

  <footer class="bg-white border-t border-gray-100 py-10 text-center">
    <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em]">© 2026 Jiuan's Travel</p>
  </footer>

  <script src="journal-data.js"></script>
  <script>
    (function () {
      var root = document.getElementById('journal-root');
      if (!root || typeof JOURNAL_ENTRIES === 'undefined') {
        root.innerHTML = '<p class="text-gray-500 text-sm">尚無日誌資料。</p>';
        return;
      }

      function esc(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      var byJourney = {};
      JOURNAL_ENTRIES.forEach(function (e) {
        var j = e.journey || '其他';
        if (!byJourney[j]) byJourney[j] = [];
        byJourney[j].push(e);
      });

      var keys = Object.keys(byJourney);
      keys.sort();

      var html = '';
      keys.forEach(function (j) {
        html += '<section class="mb-12">';
        html += '<h2 class="text-lg font-bold text-sky-900 border-b border-sky-200 pb-2 mb-4">' + esc(j) + '</h2>';
        html += '<ol class="relative border-l border-gray-200 ml-3 space-y-6 pl-6">';
        byJourney[j].forEach(function (e) {
          html += '<li class="relative">';
          html += '<span class="absolute -left-[25px] top-1.5 flex h-3 w-3 rounded-full border-2 border-sky-400 bg-white"></span>';
          html += '<p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">' + esc(e.date) + ' · ' + esc(e.dayLabel) + '</p>';
          html += '<h3 class="font-semibold text-gray-900 mt-1">' + esc(e.title) + '</h3>';
          html += '<p class="text-sm text-gray-600 mt-1">' + esc(e.country) + (e.city ? ' · ' + esc(e.city) : '') + '</p>';
          if (e.range) {
            html += '<p class="text-xs text-gray-400 mt-1">' + esc(e.range) + '</p>';
          }
          html += '</li>';
        });
        html += '</ol></section>';
      });

      root.innerHTML = html;
    })();
  </script>
</body>
</html>
