<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年份記錄 - Jiuan's Travel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ink: #163038;
      --sea: #1f5560;
      --foam: #eaf4f3;
      --sand: #f6efe5;
      --sun: #d88d4d;
      --line: rgba(22, 48, 56, 0.12);
    }

    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      line-height: 1.7;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(216, 141, 77, 0.08), transparent 26%),
        linear-gradient(180deg, #fbf8f2 0%, #f4f8f8 34%, #fafcfc 100%);
    }

    .ui-sans {
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
    }

    .hero-shell {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(36, 98, 108, 0.78), rgba(74, 128, 136, 0.62)),
        url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600') center/cover;
      box-shadow: 0 22px 50px rgba(20, 64, 72, 0.12);
      border: 1px solid rgba(31, 85, 96, 0.08);
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at top right, rgba(255,255,255,0.22), transparent 24%);
      pointer-events: none;
    }

    .year-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 60px rgba(22, 48, 56, 0.08);
      backdrop-filter: blur(8px);
    }

    .year-card::before {
      content: "";
      position: absolute;
      left: 2rem;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, rgba(216, 141, 77, 0), rgba(216, 141, 77, 0.75), rgba(31, 85, 96, 0));
      opacity: 0.9;
    }

    .stamp {
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .trip-row {
      position: relative;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
      padding: 1rem 0;
    }

    .trip-dot {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 1rem;
      margin-top: 0.4rem;
      border-radius: 999px;
      border: 3px solid rgba(216, 141, 77, 0.35);
      background: white;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.95);
    }

    .trip-link {
      display: block;
      border: 1px solid rgba(22, 48, 56, 0.08);
      border-radius: 1.25rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(246,239,229,0.7));
      padding: 1rem 1rem 0.95rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .trip-link:hover {
      transform: translateY(-2px);
      border-color: rgba(31, 85, 96, 0.24);
      box-shadow: 0 18px 35px rgba(22, 48, 56, 0.09);
    }

    .country-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(31, 85, 96, 0.14);
      background: rgba(255,255,255,0.86);
      color: var(--sea);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .country-chip::before {
      content: "✦";
      color: var(--sun);
      font-size: 0.72rem;
    }
  </style>
</head>
<body class="min-h-screen">

  <nav class="ui-sans sticky top-0 z-50 border-b border-sky-200/70 bg-[rgba(244,248,248,0.94)] text-[var(--ink)] shadow-sm backdrop-blur-xl">
    <div class="mx-auto flex max-w-5xl flex-wrap items-center justify-between gap-3 px-4 py-3">
      <a href="index.html" class="text-lg font-semibold tracking-[0.08em] text-sky-900">Jiuan's Travel</a>
      <div class="flex items-center gap-3 text-sm font-medium text-sky-900/80">
        <a href="journeys.html" class="rounded-full border border-sky-300 bg-white/80 px-3 py-1.5 transition hover:bg-sky-50 hover:text-sky-900">全部旅程</a>
        <span class="hidden text-sky-900 sm:inline">年份記錄</span>
        <a href="index.html" class="transition hover:text-sky-700">← 首頁</a>
      </div>
    </div>
  </nav>

  <header class="hero-shell mx-auto mt-4 max-w-6xl rounded-[2rem] px-4 text-white sm:px-6 lg:px-8">
    <div class="relative z-10 py-10 md:py-14">
      <p class="ui-sans mb-3 text-[11px] font-bold uppercase tracking-[0.38em] text-white/70">Year Archive · Travel Atlas</p>
      <h1 class="max-w-3xl text-4xl font-semibold leading-tight md:text-6xl">把每一年的移動軌跡，整理成一張會呼吸的旅行地圖。</h1>
      <p class="ui-sans mt-4 max-w-2xl text-sm leading-7 text-white/78 md:text-base">從第一次出發，到反覆想再去一次的國度。這裡用年份收攏所有旅程，方便你沿著時間回看每一段移動、每一個城市、每一次心情轉向。</p>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 pb-20 pt-8 sm:px-6">

    <div id="year-log-root" class="space-y-8" aria-live="polite">
      <p class="ui-sans text-sm text-[var(--sea)]/60">載入中…</p>
    </div>
  </main>

  <footer class="ui-sans border-t border-[var(--line)] bg-white/70 py-10 text-center backdrop-blur">
    <p class="text-[10px] uppercase tracking-[0.24em] text-[var(--sea)]/55">© 2026 Jiuan's Travel · Year Archive</p>
  </footer>

  <script src="assets/js/data/trips-data.js"></script>
  <script>
    (function () {
      var root = document.getElementById('year-log-root');
      if (!root || typeof TRIPS_DATA === 'undefined' || typeof escapeHtml !== 'function') {
        if (root) root.innerHTML = '<p class="ui-sans rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-amber-800">無法載入旅程資料。</p>';
        return;
      }

      var byYear = {};
      TRIPS_DATA.forEach(function (t) {
        var y = t.year;
        if (!y) return;
        if (!byYear[y]) byYear[y] = { trips: [], countries: {} };
        byYear[y].trips.push(t);
        (t.countries || []).forEach(function (c) {
          if (c && String(c).trim()) byYear[y].countries[c.trim()] = true;
        });
      });

      var years = Object.keys(byYear).map(Number).sort(function (a, b) { return b - a; });
      if (!years.length) {
        root.innerHTML = '<p class="ui-sans rounded-3xl border border-[var(--line)] bg-white px-5 py-4 text-sm text-[var(--ink)]/70">沒有含「旅遊年份」的旅程，請先在 <code class="rounded bg-[var(--foam)] px-1.5 py-0.5 text-[12px]">trips-data.js</code> 補上年份。</p>';
        return;
      }

      function tripUrl(t) {
        if (typeof tripDetailUrl === 'function') return tripDetailUrl(t);
        return 'trip.html?id=' + encodeURIComponent(t.id);
      }

      function yearMood(count) {
        if (count >= 5) return '高密度探索';
        if (count >= 3) return '持續移動';
        return '慢速收藏';
      }

      var html = '';
      years.forEach(function (y) {
        var pack = byYear[y];
        var countryList = Object.keys(pack.countries).sort(function (a, b) {
          return a.localeCompare(b, 'zh-Hant');
        });

        pack.trips.sort(function (a, b) {
          return (a.start || '').localeCompare(b.start || '') || (a.name || '').localeCompare(b.name || '', 'zh-Hant');
        });

        html += '<section class="year-card rounded-[1.8rem] px-5 py-5 md:px-8 md:py-7" id="y' + y + '">';
        html += '<div class="grid gap-6 md:grid-cols-[220px_1fr]">';
        html += '<div class="md:pr-4">';
        html += '<p class="ui-sans text-[11px] font-bold uppercase tracking-[0.34em] text-[var(--sea)]/55">Travel Year</p>';
        html += '<h2 class="mt-2 text-4xl font-semibold text-[var(--ink)] md:text-5xl">' + y + '</h2>';
        html += '<p class="ui-sans mt-2 text-sm text-[var(--ink)]/68">' + pack.trips.length + ' 趟旅程 · ' + countryList.length + ' 個國家</p>';
        html += '<div class="ui-sans mt-4 inline-flex rounded-full bg-[var(--sand)] px-3 py-1 text-xs font-semibold tracking-[0.16em] text-[var(--sea)]">' + yearMood(pack.trips.length) + '</div>';
        html += '</div>';

        html += '<div class="space-y-5">';
        html += '<div>';
        html += '<p class="ui-sans mb-3 text-[11px] font-bold uppercase tracking-[0.32em] text-[var(--sea)]/55">足跡國家</p>';
        html += '<div class="flex flex-wrap gap-2">';
        html += countryList.length
          ? countryList.map(function (c) { return '<span class="country-chip ui-sans">' + escapeHtml(c) + '</span>'; }).join('')
          : '<span class="ui-sans text-sm text-[var(--ink)]/45">—</span>';
        html += '</div></div>';

        html += '<div>';
        html += '<p class="ui-sans mb-2 text-[11px] font-bold uppercase tracking-[0.32em] text-[var(--sea)]/55">旅程時間線</p>';
        html += '<div>';
        pack.trips.forEach(function (t) {
          var href = escapeHtml(tripUrl(t));
          var countries = (t.countries || []).join('、') || '尚未整理國家';
          var meta = [t.days ? (t.days + ' 天') : '', t.start || '', t.end && t.end !== t.start ? ('至 ' + t.end) : ''].filter(Boolean).join(' · ');
          html += '<div class="trip-row">';
          html += '<div class="flex justify-center"><span class="trip-dot"></span></div>';
          html += '<a href="' + href + '" class="trip-link">';
          html += '<div class="flex flex-col gap-2 md:flex-row md:items-start md:justify-between">';
          html += '<div>';
          html += '<p class="ui-sans text-[11px] font-bold uppercase tracking-[0.24em] text-[var(--sea)]/46">' + escapeHtml(meta || '旅程記錄') + '</p>';
          html += '<h3 class="mt-1 text-xl font-semibold text-[var(--ink)]">' + escapeHtml(t.name) + '</h3>';
          html += '<p class="ui-sans mt-2 text-sm leading-6 text-[var(--ink)]/72">' + escapeHtml(countries) + '</p>';
          if (t.summary) {
            html += '<p class="ui-sans mt-2 text-sm leading-6 text-[var(--ink)]/58">' + escapeHtml(t.summary) + '</p>';
          }
          html += '</div>';
          html += '<span class="ui-sans mt-1 inline-flex items-center gap-2 text-sm font-semibold text-[var(--sea)]">查看旅程 <span aria-hidden="true">↗</span></span>';
          html += '</div></a></div>';
        });
        html += '</div></div></div></div></section>';
      });

      root.innerHTML = html;
    })();
  </script>
</body>
</html>
